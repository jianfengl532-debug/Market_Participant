<!DOCTYPE html>

    <style>
        .content-frame {

        }
        .no-content {
            display: flex;

            justify-content: center;

            font-size: 1rem;
            text-align: center;
        }
        .main-panel {
            padding: 0;
            max-width: 100%;
        }
        .main-panel .dashboard-container {
            max-width: 100%;
            margin: 0;
            padding: 1.5rem 2rem;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .main-header {
            margin-bottom: 1rem;
        }
        #content-area {
            flex: 1;
            min-height: 0;
        }

</head>
<body>
<div class="app-layout-sidebar">

<script>
(function() {
    // 默认加载最新文章
    loadPage('IndBiz_Report/SR.html');
})();

function loadPage(url) {
    var frame = document.getElementById('content-frame');
    var msg = document.getElementById('no-content-msg');
    if (msg) msg.style.display = 'none';
    frame.style.display = 'block';
    frame.src = url;
}
</script>
