<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSITION - Fund Overview</title>
    <link rel="stylesheet" href="../assetc/css/style.css">
    <style>
        /* Fund-specific styles */
        .top-form {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .top-form input {
            min-width: 140px;
        }

        .top-form input:last-child {
            flex: 1;
            min-width: 220px;
        }

        .fund-section h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #ddd;
            font-size: 1.4rem;
        }

        .value-card:nth-child(1) {
            background: #222;
        }

        .value-card:nth-child(2) {
            background: #1a1d21;
        }

        .value-card:nth-child(3) {
            background: #222;
        }

        .divider {
            width: 1px;
            background: #222;
            margin: 0 12px;
        }

        @media (max-width: 1100px) {
            .value-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 700px) {
            .value-row {
                grid-template-columns: 1fr;
            }

            .top-form {
                flex-direction: column;
                align-items: stretch;
            }

            .top-form input {
                min-width: auto;
                width: 100%;
            }
        }
    </style>
</head>
<body>
<header>
    <div class="logo-section">
        <img src="../assetc/images/AMi-LOGO.jpg" alt="LOGO" class="logo-img">
        <div>
            <div class="main-title">POSITION</div>
            <div class="sub-title"> Fund</div>
        </div>
    </div>
    <div class="top-form">
        <input type="text" placeholder="Name" id="clientName" data-save="client_name">
        <input type="tel" placeholder="Phone" id="clientPhone" data-save="client_phone">
        <input type="text" placeholder="Notes" id="clientNotes" style="flex:1; min-width:220px;" data-save="client_notes">
        <button class="upload-btn" id="uploadBtn">上传</button>
    </div>
</header>

<div class="main-container">
    <div class="fund-section" id="stock-section">
        <h2>Stock</h2>
        <div class="account-row">
            <input placeholder="开户公司" data-save="stock_broker">
            <input placeholder="客户号" data-save="stock_account">
            <input type="password" placeholder="登录密码" data-save="stock_password">
        </div>
        <div class="value-row">
            <div class="value-card"><div class="value-label">持仓权益</div><div class="value-number" id="stock-equity">0.00</div></div>
            <div class="value-card"><div class="value-label">持仓成本</div><div class="value-number" id="stock-cost">0.00</div></div>
            <div class="value-card available-funds"><div class="value-label">可用资金</div><input type="number" step="0.01" value="0.00" id="stock-available" data-save="stock_available"></div>
        </div>
        <div class="add-btn-container"><button class="add-btn" data-section="stock-section">+</button></div>
        <div class="holdings-container" data-save="stock_holdings"></div>
    </div>
    <div class="divider"></div>
    <div class="fund-section" id="options-section">
        <h2>Options</h2>
        <div class="account-row">
            <input placeholder="开户公司" data-save="options_broker">
            <input placeholder="客户号" data-save="options_account">
            <input type="password" placeholder="登录密码" data-save="options_password">
        </div>
        <div class="value-row">
            <div class="value-card"><div class="value-label">持仓权益</div><div class="value-number" id="options-equity">0.00</div></div>
            <div class="value-card"><div class="value-label">持仓成本</div><div class="value-number" id="options-cost">0.00</div></div>
            <div class="value-card available-funds"><div class="value-label">可用资金</div><input type="number" step="0.01" value="0.00" id="options-available" data-save="options_available"></div>
        </div>
        <div class="add-btn-container"><button class="add-btn" data-section="options-section">+</button></div>
        <div class="holdings-container" data-save="options_holdings"></div>
    </div>
    <div class="divider"></div>
    <div class="fund-section" id="futures-section">
        <h2>Futures</h2>
        <div class="account-row">
            <input placeholder="开户公司" data-save="futures_broker">
            <input placeholder="客户号" data-save="futures_account">
            <input type="password" placeholder="登录密码" data-save="futures_password">
        </div>
        <div class="value-row">
            <div class="value-card"><div class="value-label">持仓权益</div><div class="value-number" id="futures-equity">0.00</div></div>
            <div class="value-card"><div class="value-label">持仓成本</div><div class="value-number" id="futures-cost">0.00</div></div>
            <div class="value-card available-funds"><div class="value-label">可用资金</div><input type="number" step="0.01" value="0.00" id="futures-available" data-save="futures_available"></div>
        </div>
        <div class="add-btn-container"><button class="add-btn" data-section="futures-section">+</button></div>
        <div class="holdings-container" data-save="futures_holdings"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZ-2yPwU8CJjH_aYOCWcTe4roVoeuBLE0",
  authDomain: "myposition-5ac17.firebaseapp.com",
  databaseURL: "https://myposition-5ac17-default-rtdb.firebaseio.com",
  projectId: "myposition-5ac17",
  storageBucket: "myposition-5ac17.firebasestorage.app",
  messagingSenderId: "73151832359",
  appId: "1:73151832359:web:4727b07af94e2d14220902",
  measurementId: "G-R3F88K50DV"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const phoneInput = document.getElementById('clientPhone');
const uploadBtn = document.getElementById('uploadBtn');

// ======================== 密碼設置 ========================
const PASSWORD = "160324";   // ← 在這裡修改密碼

function addHolding(sectionId, initial = null) {
    const section = document.getElementById(sectionId);
    if (!section) return console.error("Section not found:", sectionId);
    const container = section.querySelector('.holdings-container');
    const item = document.createElement('div');
    item.className = 'holding-item';
    item.innerHTML = `
        <div><label>代码</label><input type="text" placeholder="代码" class="code" value="${initial?.code || ''}"></div>
        <div><label>成本价</label><input type="number" step="0.01" value="${initial?.cost || '0.00'}" class="cost"></div>
        <div><label>数量</label><input type="number" step="1" value="${initial?.quantity || '0'}" class="quantity"></div>
        <div><label>结算价</label><input type="number" step="0.01" value="${initial?.settle || '0.00'}" class="settle"></div>
        <div class="holding-actions">
            <button class="calc-btn">计算</button>
            <button class="delete-btn">删除</button>
        </div>
    `;
    container.appendChild(item);
    item.querySelector('.calc-btn').addEventListener('click', () => updateTotals(sectionId));
    item.querySelector('.delete-btn').addEventListener('click', () => {
        item.remove();
        updateTotals(sectionId);
    });
}

function updateTotals(sectionId) {
    const section = document.getElementById(sectionId);
    if (!section) return;
    let totalEquity = 0;
    let totalCost = 0;
    section.querySelectorAll('.holding-item').forEach(row => {
        const qty = parseFloat(row.querySelector('.quantity').value) || 0;
        const cost = parseFloat(row.querySelector('.cost').value) || 0;
        const settle = parseFloat(row.querySelector('.settle').value) || 0;
        totalEquity += settle * qty;
        totalCost += cost * qty;
    });
    document.getElementById(`${sectionId.replace('-section', '')}-equity`).textContent = totalEquity.toFixed(2);
    document.getElementById(`${sectionId.replace('-section', '')}-cost`).textContent = totalCost.toFixed(2);
}

async function saveAllData() {
    const phone = phoneInput.value.trim();
    if (!phone) {
        alert("请输入 Phone 后再上传");
        return;
    }
    uploadBtn.disabled = true;
    uploadBtn.textContent = "上传中...";
    try {
        const fundRef = ref(db, 'funds/' + phone);
        const data = {};
        document.querySelectorAll('[data-save]').forEach(el => {
            if (el.type === 'password') return;
            let value = el.value || '';
            const parts = el.dataset.save.split('_');
            let current = data;
            for (let i = 0; i < parts.length - 1; i++) {
                current[parts[i]] = current[parts[i]] || {};
                current = current[parts[i]];
            }
            current[parts[parts.length - 1]] = value;
        });
        ['stock', 'options', 'futures'].forEach(type => {
            const container = document.querySelector(`#${type}-section .holdings-container`);
            const holdings = [];
            container.querySelectorAll('.holding-item').forEach(item => {
                holdings.push({
                    code: item.querySelector('.code')?.value || '',
                    cost: item.querySelector('.cost')?.value || '0.00',
                    quantity: item.querySelector('.quantity')?.value || '0',
                    settle: item.querySelector('.settle')?.value || '0.00'
                });
            });
            data[`${type}_holdings`] = holdings;
            data[`${type}_totalEquity`] = document.getElementById(`${type}-equity`).textContent || '0.00';
            data[`${type}_totalCost`] = document.getElementById(`${type}-cost`).textContent || '0.00';
        });
        await set(fundRef, data);
        alert(`上传成功！\n已保存到 /funds/${phone}`);
    } catch (err) {
        console.error("保存失败:", err);
        alert("上传失败：\n" + (err.message || err.code || "未知错误，请查看控制台"));
    } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = "上传";
    }
}

// 帶密碼驗證的上传入口
function tryUpload() {
    const input = prompt("请输入上传密码：");
    
    if (input === null) {
        // 用户点了取消
        return;
    }
    
    if (input === PASSWORD) {
        saveAllData();
    } else {
        alert("密码错误！");
    }
}

async function loadDataFromFirebase(phone) {
    if (!phone) return;
    try {
        const fundRef = ref(db, 'funds/' + phone);
        const snapshot = await get(fundRef);
        const data = snapshot.val();
        if (!data) {
            alert("未找到该 Phone 的数据");
            return;
        }
        document.querySelectorAll('[data-save]').forEach(el => {
            if (el.type === 'password') return;
            const parts = el.dataset.save.split('_');
            let val = data;
            for (const p of parts) val = val?.[p];
            if (val !== undefined) el.value = val;
        });
        ['stock', 'options', 'futures'].forEach(type => {
            const container = document.querySelector(`#${type}-section .holdings-container`);
            container.innerHTML = '';
            const holdings = data[`${type}_holdings`] || [];
            holdings.forEach(h => addHolding(`${type}-section`, h));
            updateTotals(`${type}-section`);
        });
        alert(`已加载 Phone: ${phone} 的数据`);
    } catch (err) {
        console.error("加载失败:", err);
        alert("加载失败：" + (err.message || err.code));
    }
}

document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.add-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const sectionId = btn.dataset.section;
            addHolding(sectionId);
        });
    });
    
    phoneInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            const val = phoneInput.value.trim();
            if (val) loadDataFromFirebase(val);
        }
    });
    
    // 修改：使用 tryUpload 代替直接 saveAllData
    uploadBtn.addEventListener('click', tryUpload);
});
</script>
</body>
</html>
