<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具详情 - 我的工具库</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">

    <!-- 顶部导航 -->
    <nav class="navbar">
        <div class="logo">⚙️我的工具库</div>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="#">全部工具</a>
            <a href="#">关于</a>
        </div>
    </nav>

    <!-- 双栏布局 -->
    <div class="content-wrapper">
        <div class="main-content">
            <div class="detail-content">

                <!-- 封面 -->
                <div class="detail-cover" id="detailCover">📁 加载中...</div>

                <!-- 名称+版本 -->
                <div class="detail-header">
                    <span class="detail-title" id="detailTitle">工具名称</span>
                    <span class="detail-version" id="detailVersion">版本</span>
                </div>

                <!-- 元信息 -->
                <div class="detail-meta" id="detailMeta">
                    <div class="meta-item"><span class="label">发布日期</span><span class="value" id="metaRelease">--</span></div>
                    <div class="meta-item"><span class="label">开发者</span><span class="value" id="metaDeveloper">--</span></div>
                    <div class="meta-item"><span class="label">分类</span><span class="value" id="metaCategory">--</span></div>
                    <div class="meta-item"><span class="label">评分</span><span class="value stars" id="metaRating">--</span></div>
                    <div class="meta-item"><span class="label">更新时间</span><span class="value" id="metaUpdate">--</span></div>
                </div>

                <!-- 简介 -->
                <div class="detail-description" id="detailDesc">加载中...</div>

                <!-- 按钮组 -->
                <div class="detail-actions">
                    <!-- 下载按钮改为触发弹窗 -->
                    <a href="#" class="btn-download-green" id="downloadBtn" data-id="">⬇ 下载工具</a>
                    <a href="index.html" class="btn-back">🏠 返回首页</a>
                </div>

                <!-- 截图 -->
                <div class="detail-screenshots">
                    <h4>工具截图</h4>
                    <div class="screenshot-grid" id="screenshotGrid"></div>
                </div>

            </div>
        </div>

        <!-- 侧边栏 -->
        <aside class="sidebar">
            <h3 class="sidebar-title">分类</h3>
            <ul class="category-list">
                <li class="category-item"><img src="asses/icon/瞄准 (1).png" alt="动作" class="category-icon"><span>动作</span></li>
                <li class="category-item"><img src="asses/icon/剑.png" alt="RPG" class="category-icon"><span>RPG</span></li>
                <li class="category-item"><img src="asses/icon/城堡1.png" alt="策略" class="category-icon"><span>策略</span></li>
            </ul>
        </aside>
    </div>

    <!-- 页脚 -->
    <div class="footer">本页面仅用于演示样式 · 所有工具均为示例</div>
</div>

<!-- ========== 下载弹窗（与 index.html 完全一致） ========== -->
<div class="modal-overlay" id="downloadModal">
    <div class="modal-box">
        <button class="modal-close" id="modalCloseBtn">✕</button>

        <!-- 支付区域 -->
        <div id="paySection">
            <div class="modal-title">请先支付</div>
            <div class="modal-sub">扫描下方二维码付款后，点击下方按钮获取下载链接</div>
            <div class="pay-qr" style="text-align:center; margin: 20px 0;">
                <img src="asses/img/75409c7cf4297e30628fdbd74bacee1e.jpg" alt="收款二维码" style="width:180px; height:180px; background:#fff; border-radius:12px; padding:10px; object-fit:contain;">
            </div>
            <button id="mockPayBtn" style="background: #2e7d32; border: none; color: #fff; padding: 10px 30px; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; display: block; margin: 0 auto 10px;">✅ 我已支付，获取解锁码</button>
        </div>

        <!-- 解锁码展示区（支付成功后显示） -->
        <div id="unlockSection" style="display:none;">
            <div class="modal-title">🎉 支付成功！</div>
            <div class="modal-sub">您的解锁码已生成，输入后即可获取下载链接</div>
            <div style="text-align:center; margin: 15px 0; font-size:14px; color:#9aa6bf;">
                解锁码已发送至下方，请复制后粘贴到输入框
            </div>
            <div style="text-align:center; margin: 10px 0;">
                <span id="unlockCodeDisplay" style="font-size:24px; font-weight:700; color:#5b7cfa; letter-spacing:3px; background:#0f151e; padding:12px 24px; border-radius:10px; border:1px solid #2a3342; display:inline-block; user-select:all;">--------</span>
            </div>
            <div style="display:flex; gap:10px; margin: 15px 0;">
                <input type="text" id="unlockInput" placeholder="粘贴解锁码" style="flex:1; padding:10px; border-radius:8px; border:1px solid #334155; background:#0f151e; color:#d0d7e6; font-size:16px; text-align:center; letter-spacing:2px; text-transform:uppercase;">
                <button id="verifyUnlockBtn" style="background: #2d3b4f; border: none; color: #dae2f0; padding: 10px 24px; border-radius:30px; font-size:16px; font-weight:500; cursor:pointer; white-space:nowrap;">验证</button>
            </div>
            <div id="unlockError" style="color:#e74c3c; text-align:center; font-size:14px; min-height:24px;"></div>
        </div>

        <!-- 下载区域 -->
        <div id="downloadSection" style="display:none;">
            <div class="modal-title" id="modalToolName">工具名称</div>
            <div class="modal-sub" id="modalSub">感谢支持，点击下方链接下载</div>
            <div class="modal-link-box">
                <a href="#" id="modalLink" target="_blank">网盘链接</a>
            </div>
            <div class="modal-extract" id="modalExtract">提取码：xxxx</div>
        </div>

    </div>
</div>

<!-- 固定侧边收款按钮 -->
<div class="donate-side" id="donateSideBtn">
    <img src="asses/img/75409c7cf4297e30628fdbd74bacee1e.jpg" alt="赞赏" style="object-fit:cover;">
    <span>支持作者</span>
</div>

<script src="js/script.js"></script>

<script>
(function() {
    // ── API 配置 ──
    const DETAIL_API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
        ? 'http://localhost:8000/Lucifer_Data'
        : 'https://jefflu.tail9f69ce.ts.net/Lucifer_Data';

    const urlParams = new URLSearchParams(window.location.search);
    const toolName = urlParams.get('name');
    if (!toolName) {
        document.getElementById('detailTitle').textContent = '未指定工具';
        return;
    }
    document.getElementById('detailTitle').textContent = '加载中...';

    // ── 从 API 加载工具详情 ──
    fetch(`${DETAIL_API_BASE}/get_tool.php?action=detail&name=${encodeURIComponent(toolName)}`, {
        headers: { 'X-API-Key': 'mk_jfl_a8f3c9e2b7d4p6q5r1' }
    })
        .then(response => response.json())
        .then(data => {
            if (!data.success) {
                alert('获取工具详情失败：' + (data.error || '未知错误'));
                document.getElementById('detailTitle').textContent = '加载失败';
                return;
            }

            const tool = data.tool;

            // 封面
            const coverBox = document.getElementById('detailCover');
            if (tool.cover) {
                coverBox.innerHTML = `<img src="${tool.cover}" alt="封面" style="width:100%; height:100%; object-fit:cover; border-radius:12px;">`;
            } else {
                coverBox.textContent = '📁 暂无封面';
            }

            // 基本信息
            document.getElementById('detailTitle').textContent = tool.name || toolName;
            document.getElementById('detailVersion').textContent = tool.version || '';
            document.getElementById('metaRelease').textContent = tool.release_date || '未知';
            document.getElementById('metaDeveloper').textContent = tool.developer || '未知';
            document.getElementById('metaCategory').textContent = tool.category || '未知';

            // 评分（星标）
            const rating = parseFloat(tool.rating);
            if (!isNaN(rating)) {
                const full = Math.floor(rating);
                const half = (rating - full) >= 0.5 ? 1 : 0;
                const empty = 5 - full - half;
                document.getElementById('metaRating').innerHTML =
                    '★'.repeat(full) + (half ? '★' : '') + '☆'.repeat(empty);
            } else {
                document.getElementById('metaRating').textContent = '暂无评分';
            }

            document.getElementById('metaUpdate').textContent = tool.update_date || '未知';
            document.getElementById('detailDesc').textContent = tool.description || '暂无简介';

            // 截图
            const grid = document.getElementById('screenshotGrid');
            grid.innerHTML = '';
            const screenshots = tool.screenshots || [];
            for (let i = 0; i < 6; i++) {
                const item = document.createElement('div');
                item.className = 'screenshot-item';
                if (i < screenshots.length && screenshots[i]) {
                    item.innerHTML = `<img src="${screenshots[i]}" alt="截图${i+1}" style="width:100%; height:100%; object-fit:cover; border-radius:8px;">`;
                } else {
                    item.textContent = `截图 ${i+1}`;
                }
                grid.appendChild(item);
            }

            // ── 下载按钮：从全局 tools 数组找 id → 触发弹窗 ──
            const downloadBtn = document.getElementById('downloadBtn');
            if (typeof tools !== 'undefined') {
                const matched = tools.find(t => t.name === tool.name);
                if (matched) {
                    downloadBtn.dataset.id = matched.id;
                } else {
                    downloadBtn.dataset.toolName = tool.name;
                }
            } else {
                downloadBtn.dataset.toolName = tool.name;
            }

            downloadBtn.removeAttribute('href');
            downloadBtn.addEventListener('click', function(e) {
                e.preventDefault();
                const id = this.dataset.id;
                if (id && typeof showToolModal === 'function') {
                    showToolModal(parseInt(id));
                } else {
                    const name = this.dataset.toolName;
                    if (name && typeof tools !== 'undefined') {
                        const found = tools.find(t => t.name === name);
                        if (found) {
                            showToolModal(found.id);
                        } else {
                            alert('未找到工具信息');
                        }
                    } else {
                        alert('无法识别工具');
                    }
                }
            });
        })
        .catch(error => {
            console.error('请求失败:', error);
            alert('加载工具详情失败，请检查网络');
            document.getElementById('detailTitle').textContent = '加载出错';
        });
})();
</script>
</body>
</html>
