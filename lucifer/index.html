<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的小工具库</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">

    <!-- 导航 -->
    <nav class="navbar">
        <div class="logo">⚙️我的工具库</div>
        <div class="nav-links">
            <a href="#">首页</a>
            <a href="#">全部工具</a>
            <a href="#">关于</a>
        </div>
    </nav>

    <!-- 头部统计 -->
    <div class="hero">
        <div class="hero-stats">
            <span><strong>12</strong>个小工具</span>
            <span><strong>6</strong>个分类</span>
            <span><strong>1,280</strong> 次下载</span>
        </div>
        <div class="hero-tagline">
            <em>✨ 专为行业场景打造</em> · 所有工具完全免费 · 持续更新
        </div> 
    </div>

    <!-- 双栏布局 -->
    <div class="content-wrapper">
        <div class="main-content">
            <div class="tool-grid" id="toolGrid"></div>
        </div>  
        <aside class="sidebar">
            <h3 class="sidebar-title">分类</h3>
            <ul class="category-list">
                <li class="category-item">
                    <img src="asses/icon/瞄准 (1).png" alt="动作" class="category-icon">
                    <span>动作</span>
                </li>
                <li class="category-item">
                    <img src="asses/icon/剑.png" alt="RPG" class="category-icon">
                    <span>RPG</span>
                </li>
                <li class="category-item">
                    <img src="asses/icon/城堡1.png" alt="策略" class="category-icon">
                    <span>策略</span>
                </li>
            </ul>
        </aside>
    </div>

    <!-- 页脚 -->
    <div class="footer">本页面仅用于演示样式 · 所有工具均为示例</div>
</div>

<!-- ========== 下载弹窗（支付 + 下载双区域） ========== -->
<div class="modal-overlay" id="downloadModal">
    <div class="modal-box">
        <button class="modal-close" id="modalCloseBtn">✕</button>

        <!-- 支付区域（默认显示） -->
        <div id="paySection">
            <div class="modal-title">请先支付</div>
            <div class="modal-sub">扫描下方二维码付款后，点击下方按钮获取下载链接</div>
            <div class="pay-qr" style="text-align:center; margin: 20px 0;">
                <img src="asses/img/75409c7cf4297e30628fdbd74bacee1e.jpg" alt="收款二维码" style="width:180px; height:180px; background:#fff; border-radius:12px; padding:10px; object-fit:contain;">
            </div>
            <button id="mockPayBtn" style="background: #2e7d32; border: none; color: #fff; padding: 10px 30px; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; display: block; margin: 0 auto 10px;">✅ 我已支付，获取解锁码</button>
        </div>

        <!-- 解锁码展示区（支付成功后显示） -->
        <div id="unlockSection" style="display:none;">
            <div class="modal-title">🎉 支付成功！</div>
            <div class="modal-sub">您的解锁码已生成，输入后即可获取下载链接</div>
            <div style="text-align:center; margin: 15px 0; font-size:14px; color:#9aa6bf;">
                解锁码已发送至下方，请复制后粘贴到输入框
            </div>
            <div style="text-align:center; margin: 10px 0;">
                <span id="unlockCodeDisplay" style="font-size:24px; font-weight:700; color:#5b7cfa; letter-spacing:3px; background:#0f151e; padding:12px 24px; border-radius:10px; border:1px solid #2a3342; display:inline-block; user-select:all;">--------</span>
            </div>
            <div style="display:flex; gap:10px; margin: 15px 0;">
                <input type="text" id="unlockInput" placeholder="粘贴解锁码" style="flex:1; padding:10px; border-radius:8px; border:1px solid #334155; background:#0f151e; color:#d0d7e6; font-size:16px; text-align:center; letter-spacing:2px; text-transform:uppercase;">
                <button id="verifyUnlockBtn" style="background: #2d3b4f; border: none; color: #dae2f0; padding: 10px 24px; border-radius:30px; font-size:16px; font-weight:500; cursor:pointer; white-space:nowrap;">验证</button>
            </div>
            <div id="unlockError" style="color:#e74c3c; text-align:center; font-size:14px; min-height:24px;"></div>
        </div>

        <!-- 下载区域（初始隐藏） -->
        <div id="downloadSection" style="display:none;">
            <div class="modal-title" id="modalToolName">工具名称</div>
            <div class="modal-sub" id="modalSub">感谢支持，点击下方链接下载</div>
            <div class="modal-link-box">
                <a href="#" id="modalLink" target="_blank">网盘链接</a>
            </div>
            <div class="modal-extract" id="modalExtract">提取码：xxxx</div>
        </div>

    </div>
</div>

<!-- 固定侧边收款按钮 -->
<div class="donate-side" id="donateSideBtn">
    <img src="asses/img/75409c7cf4297e30628fdbd74bacee1e.jpg" alt="赞赏" style="object-fit:cover;">
    <span>支持作者</span>
</div>

<script src="js/script.js"></script>
</body>
</html>
