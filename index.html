<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSITION - Plan - Fund (overview)</title>
    <style>
        body { 
            background: #0f1114; 
            color: #e0e0e0; 
            font-family: "Segoe UI", Arial, sans-serif; 
            margin: 0; 
        }
        header { 
            background: #111418; 
            border-bottom: 1px solid #222; 
            padding: 12px 24px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; 
            gap: 16px; 
        }
        .logo-section { display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 36px; }
        .main-title { font-size: 1.6rem; font-weight: bold; color: #fff; }
        .sub-title { font-size: 0.9rem; color: #aaa; }
        .nav { display: flex; align-items: center; gap: 16px; }
        .nav span, .nav a { 
            font-size: 1rem; 
            padding: 6px 12px; 
            border-radius: 4px; 
            text-decoration: none; 
            color: #fff; 
        }
        .nav .active { background: #14171c; color: #e0e0e0; }
        .nav a { color: #fff; }
        .nav a:hover { background: #1a1d21; }
        .main-container { 
            padding: 24px; 
            display: flex; 
            gap: 24px; 
            flex-wrap: wrap; 
        }
        .plan-section, .fund-section { 
            flex: 1; 
            min-width: 320px; 
            background: #14171c; 
            border: 1px solid #222; 
            border-radius: 6px; 
            padding: 20px; 
        }
        .plan-section h2, .fund-section h2 { 
            text-align: center; 
            margin-bottom: 20px; 
            color: #ddd; 
            font-size: 1.4rem; 
        }

        /* Plan 布局核心样式 */
        .plan-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }
        .left-area .row {
            margin-bottom: 16px;
        }
        .left-area label {
            display: block;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 6px;
        }
        .left-area input, 
        .left-area textarea {
            width: 100%;
            background: #1a1d21;
            border: none;
            padding: 10px 12px;
            border-radius: 4px;
            color: #fff;
            box-sizing: border-box;
            font-size: 0.95rem;
        }
        .inline-row {
            display: flex;
            gap: 12px;
        }
        .inline-row input {
            flex: 1;
        }
        .plan-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .plan-grid textarea {
            height: 90px;
            resize: vertical;
        }
        .conclusion textarea {
            min-height: 140px;
            resize: vertical;
        }

        /* 右侧价格区 */
        .price-area {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .price-area input[type="number"] {
            background: #222;
            border: none;
            padding: 10px;
            border-radius: 4px;
            color: #fff;
            font-size: 1rem;
            text-align: right;
        }
        .price-area .calc-btn {
            background: #3a8cff;
            border: none;
            padding: 12px;
            border-radius: 4px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }
        .price-area .calc-btn:hover {
            background: #1e70e6;
        }
        .result-list {
            margin-top: 16px;
            background: #1a1d21;
            border-radius: 4px;
            padding: 10px;
            max-height: 320px;
            overflow-y: auto;
            font-size: 0.95rem;
        }
        .result-list div {
            padding: 6px 8px;
            border-bottom: 1px solid #333;
            text-align: right;
        }
        .result-list div:last-child {
            border-bottom: none;
        }

        /* Fund 部分样式保持不变（略） */
        .account-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
        .account-row input { flex: 1; min-width: 140px; background: #1a1d21; border: none; padding: 10px; border-radius: 4px; color: #fff; }
        .value-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 32px; }
        .value-card { background: #1a1d21; padding: 16px; text-align: center; border-radius: 6px; }
        .value-card:nth-child(1) { background: #222; }
        .value-card:nth-child(2) { background: #1a1d21; }
        .value-card:nth-child(3) { background: #222; }
        .value-label { font-size: 0.9rem; color: #aaa; margin-bottom: 8px; }
        .value-number { font-size: 1.3rem; font-weight: bold; color: #0f8; }
        .available-funds input { width: 100%; font-size: 1.3rem; font-weight: bold; color: #0f8; text-align: center; background: #0f2a1a; padding: 12px; box-sizing: border-box; }
        .add-btn-container { text-align: center; margin: 20px 0; }
        .add-btn { width: 48px; height: 48px; background: #c0392b; border: none; border-radius: 50%; color: #fff; font-size: 2rem; cursor: pointer; line-height: 48px; transition: 0.2s; }
        .add-btn:hover { background: #e74c3c; }
        .holding-item { background: #1a1d21; border: 1px solid #333; border-radius: 6px; padding: 12px 16px; margin-top: 16px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .holding-item > div { flex: 1; min-width: 110px; }
        .holding-item input { width: 100%; background: #222; border: none; padding: 8px 10px; border-radius: 4px; color: #fff; font-size: 0.95rem; }
        .holding-item label { font-size: 0.85rem; color: #aaa; margin-bottom: 4px; display: block; }
        .holding-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .delete-btn { background: #c0392b; border: none; color: #fff; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
        .delete-btn:hover { background: #a93226; }

        @media (max-width: 1100px) {
            .plan-layout { grid-template-columns: 1fr; }
            .price-area { margin-top: 20px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-section">
            <img src="assetc/images/AMi-LOGO.jpg" alt="LOGO" class="logo-img">
            <div>
                <div class="main-title">POSITION</div>
                <div class="sub-title">Plan - Fund (overview)</div>
            </div>
        </div>
        <div class="nav">
            <span class="active">Home</span>
            <a href="https://jianfengl532-debug.github.io/Market_Participant/plan/plan.html" target="_blank">Plan+</a>
            <a href="https://jianfengl532-debug.github.io/Market_Participant/fund/fund.html" target="_blank">Fund+</a>
        </div>
    </header>

    <div class="main-container">
        <!-- Plan 区域 -->
        <div class="plan-section">
            <h2>Plan</h2>
            <div class="plan-layout">
                <!-- 左侧主要输入区 -->
                <div class="left-area">
                    <div class="row inline-row">
                        <input id="plan-variety" placeholder="品种">
                        <input id="plan-code" placeholder="代码">
                    </div>
                    <div class="row">
                        <label>目标</label>
                        <input id="plan-target" placeholder="目标">
                    </div>
                    <div class="row inline-row">
                        <input id="plan-d" placeholder="D">
                        <input id="plan-w" placeholder="W">
                        <input id="plan-mo" placeholder="Mo">
                    </div>
                    <div class="row plan-grid">
                        <textarea id="plan-plan1" placeholder="Plan 1"></textarea>
                        <textarea id="plan-plan2" placeholder="Plan 2"></textarea>
                    </div>
                    <div class="row plan-grid">
                        <textarea id="plan-plan3" placeholder="Plan 3"></textarea>
                        <textarea id="plan-plan4" placeholder="Plan 4"></textarea>
                    </div>
                    <div class="row conclusion">
                        <label>结论</label>
                        <textarea id="plan-conclusion" placeholder="结论"></textarea>
                    </div>
                </div>

                <!-- 右侧价格 + 计算 -->
                <div class="price-area">
                    <input type="number" id="plan-price1" placeholder="价格1" step="0.01">
                    <input type="number" id="plan-price2" placeholder="价格2" step="0.01">
                    <input type="number" id="plan-price3" placeholder="价格3" step="0.01">
                    <button class="calc-btn">计算</button>
                    <div class="result-list" id="plan-result"></div>
                </div>
            </div>
        </div>

        <!-- Fund 区域（保持原样，可继续使用之前的 fund 逻辑） -->
        <div class="fund-section" id="fund-section">
            <h2>Fund</h2>
            <div class="account-row">
                <input id="fund-broker" placeholder="开户公司">
                <input id="fund-account" placeholder="客户号">
                <input id="fund-password" type="password" placeholder="登录密码">
            </div>
            <div class="value-row">
                <div class="value-card"><div class="value-label">持仓权益</div><div class="value-number" id="fund-equity">0.00</div></div>
                <div class="value-card"><div class="value-label">持仓成本</div><div class="value-number" id="fund-cost">0.00</div></div>
                <div class="value-card available-funds"><div class="value-label">可用资金</div><input type="number" step="0.01" value="0.00" id="fund-available"></div>
            </div>
            <div class="add-btn-container"><button class="add-btn">+</button></div>
            <div class="holdings-container"></div>
        </div>
    </div>

    <script type="module">
        // Firebase 初始化（保持不变）
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ-2yPwU8CJjH_aYOCWcTe4roVoeuBLE0",
            authDomain: "myposition-5ac17.firebaseapp.com",
            databaseURL: "https://myposition-5ac17-default-rtdb.firebaseio.com",
            projectId: "myposition-5ac17",
            storageBucket: "myposition-5ac17.firebasestorage.app",
            messagingSenderId: "73151832359",
            appId: "1:73151832359:web:4727b07af94e2d14220902",
            measurementId: "G-R3F88K50DV"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Plan 计算逻辑（示例：价格 × 常见比例）
        document.querySelector('.calc-btn').addEventListener('click', () => {
            const prices = [
                Number(document.getElementById('plan-price1').value) || 0,
                Number(document.getElementById('plan-price2').value) || 0,
                Number(document.getElementById('plan-price3').value) || 0
            ];
            const rates = [0.125, 0.25, 0.333, 0.50, 0.625, 0.667, 0.75, 0.875];
            let results = [];
            prices.forEach(p => {
                if (p > 0) {
                    rates.forEach(r => results.push((p * r).toFixed(2)));
                }
            });
            results.sort((a,b) => b - a);
            const resultDiv = document.getElementById('plan-result');
            resultDiv.innerHTML = results.length === 0 
                ? '<div style="color:#888; text-align:center;">无有效价格</div>'
                : results.map(v => `<div>${v}</div>`).join('');
        });

        // 后续的搜索逻辑、Fund 添加持仓等代码可继续沿用你之前的版本...
        // 这里省略以保持简洁，如需要可直接拼接回去
    </script>
</body>
</html>
