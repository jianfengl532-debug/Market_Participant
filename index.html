<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSITION - Plan - Fund (overview)</title>
    <link rel="stylesheet" href="../assetc/css/style.css">
    <style>
        /* Index-specific styles */
        .plan-section, .fund-section {
            flex: 1;
            min-width: 320px;
            background: #14171c;
            border: 1px solid #222;
            border-radius: 6px;
            padding: 20px;
        }

        .plan-section h2, .fund-section h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #ddd;
            font-size: 1.4rem;
        }

        .left-area .row {
            margin-bottom: 16px;
        }

        .left-area label {
            display: block;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 6px;
        }

        .left-area input,
        .left-area textarea {
            width: 100%;
            box-sizing: border-box;
        }

        .conclusion textarea {
            min-height: 140px;
            resize: vertical;
        }

        .price-area {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .price-area .calc-btn {
            margin-top: 8px;
        }

        .result-list {
            margin-top: 16px;
            max-height: 320px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-section">
            <img src="assetc/images/AMi-LOGO.jpg" alt="LOGO" class="logo-img">
            <div>
                <div class="main-title">POSITION</div>
                <div class="sub-title">Plan - Fund (overview)</div>
            </div>
        </div>
        <div class="nav">
            <span class="active">Home</span>
            <a href="https://jianfengl532-debug.github.io/Market_Participant/plan/plan.html" target="_blank">Plan+</a>
            <a href="https://jianfengl532-debug.github.io/Market_Participant/fund/fund.html" target="_blank">Fund+</a>
        </div>
    </header>

    <div class="main-container">
        <!-- ==================== Plan 面板 ==================== -->
        <div class="plan-section">
            <h2>Plan</h2>
            <div class="plan-layout">
                <div class="left-area">
                    <div class="row inline-row">
                        <input id="plan-variety" placeholder="品种" readonly>
                        <input id="plan-code" placeholder="代码">   <!-- 唯一可编辑 -->
                    </div>
                    <div class="row">
                        <label>目标</label>
                        <input id="plan-target" placeholder="目标" readonly>
                    </div>
                    <div class="row inline-row">
                        <input id="plan-d" placeholder="D" readonly>
                        <input id="plan-w" placeholder="W" readonly>
                        <input id="plan-mo" placeholder="Mo" readonly>
                    </div>
                    <div class="row plan-grid">
                        <textarea id="plan-plan1" placeholder="Plan 1" readonly></textarea>
                        <textarea id="plan-plan2" placeholder="Plan 2" readonly></textarea>
                    </div>
                    <div class="row plan-grid">
                        <textarea id="plan-plan3" placeholder="Plan 3" readonly></textarea>
                        <textarea id="plan-plan4" placeholder="Plan 4" readonly></textarea>
                    </div>
                    <div class="row conclusion">
                        <label>结论</label>
                        <textarea id="plan-conclusion" placeholder="结论" readonly></textarea>
                    </div>
                </div>

                <div class="price-area">
                    <input type="number" id="plan-price1" placeholder="价格1" step="0.01" readonly>
                    <input type="number" id="plan-price2" placeholder="价格2" step="0.01" readonly>
                    <input type="number" id="plan-price3" placeholder="价格3" step="0.01" readonly>
                    <button class="calc-btn">计算</button>
                    <div class="result-list" id="plan-result"></div>
                </div>
            </div>
        </div>

        <!-- ==================== Fund 面板 ==================== -->
        <div class="fund-section" id="fund-section">
            <h2>Fund</h2>
            <div class="account-row">
                <input id="fund-broker" placeholder="开户公司" readonly>
                <input id="fund-account" placeholder="客户号">   <!-- 唯一可编辑 -->
                <input id="fund-password" type="password" placeholder="登录密码" readonly>
            </div>
            <div class="value-row">
                <div class="value-card">
                    <div class="value-label">持仓权益</div>
                    <div class="value-number" id="fund-equity">0.00</div>
                </div>
                <div class="value-card">
                    <div class="value-label">持仓成本</div>
                    <div class="value-number" id="fund-cost">0.00</div>
                </div>
                <div class="value-card available-funds">
                    <div class="value-label">可用资金</div>
                    <input type="number" step="0.01" value="0.00" id="fund-available" readonly>
                </div>
            </div>
            <div class="add-btn-container"><button class="add-btn">+</button></div>
            <div class="holdings-container"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ-2yPwU8CJjH_aYOCWcTe4roVoeuBLE0",
            authDomain: "myposition-5ac17.firebaseapp.com",
            databaseURL: "https://myposition-5ac17-default-rtdb.firebaseio.com",
            projectId: "myposition-5ac17",
            storageBucket: "myposition-5ac17.firebasestorage.app",
            messagingSenderId: "73151832359",
            appId: "1:73151832359:web:4727b07af94e2d14220902",
            measurementId: "G-R3F88K50DV"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ==================== Plan 计算按钮 ====================
        document.querySelector('.calc-btn').addEventListener('click', () => {
            const prices = [
                Number(document.getElementById('plan-price1').value) || 0,
                Number(document.getElementById('plan-price2').value) || 0,
                Number(document.getElementById('plan-price3').value) || 0
            ];
            const rates = [0.125, 0.25, 0.333, 0.50, 0.625, 0.667, 0.75, 0.875];
            let results = [];
            prices.forEach(p => {
                if (p > 0) rates.forEach(r => results.push((p * r).toFixed(2)));
            });
            results.sort((a,b) => b - a);
            document.getElementById('plan-result').innerHTML = results.length === 0
                ? '<div style="color:#888;text-align:center;">无有效价格</div>'
                : results.map(v => `<div>${v}</div>`).join('');
        });

        // ==================== Fund 持仓相关函数 ====================
        function addHolding(sectionId, initial = null) {
            const section = document.getElementById(sectionId);
            if (!section) return;
            const container = section.querySelector('.holdings-container');
            const item = document.createElement('div');
            item.className = 'holding-item';
            item.innerHTML = `
                <div><label>代码</label><input type="text" placeholder="代码" class="code" value="${initial?.code || ''}" readonly></div>
                <div><label>成本价</label><input type="number" step="0.01" value="${initial?.cost || '0.00'}" class="cost" readonly></div>
                <div><label>数量</label><input type="number" step="1" value="${initial?.quantity || '0'}" class="quantity" readonly></div>
                <div><label>结算价</label><input type="number" step="0.01" value="${initial?.settle || '0.00'}" class="settle" readonly></div>
                <div class="holding-actions">
                    <button class="calc-btn">计算</button>
                    <button class="delete-btn">删除</button>
                </div>
            `;
            container.appendChild(item);

            item.querySelector('.calc-btn').addEventListener('click', () => updateTotals(sectionId));
            item.querySelector('.delete-btn').addEventListener('click', () => {
                item.remove();
                updateTotals(sectionId);
            });
        }

        function updateTotals(sectionId) {
            const section = document.getElementById(sectionId);
            if (!section) return;
            let totalEquity = 0, totalCost = 0;
            section.querySelectorAll('.holding-item').forEach(row => {
                const qty = parseFloat(row.querySelector('.quantity').value) || 0;
                const cost = parseFloat(row.querySelector('.cost').value) || 0;
                const settle = parseFloat(row.querySelector('.settle').value) || 0;
                totalEquity += settle * qty;
                totalCost += cost * qty;
            });
            document.getElementById('fund-equity').textContent = totalEquity.toFixed(2);
            document.getElementById('fund-cost').textContent = totalCost.toFixed(2);
        }

        document.querySelector('.add-btn').addEventListener('click', () => addHolding('fund-section'));

        // ==================== Plan 搜索（仅代码可输入） ====================
        document.getElementById('plan-code').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                let code = e.target.value.trim();
                if (!code) return alert('请输入代码');
                const plansRef = ref(db, 'plans');
                get(plansRef).then(snapshot => {
                    const data = snapshot.val();
                    if (!data) return alert('plans 节点为空');

                    let planData = null;
                    let matchedSection = null;

                    if (data[code]) {
                        planData = data[code];
                        if (planData.stock?.code) matchedSection = 'stock';
                        else if (planData.options?.code) matchedSection = 'options';
                        else if (planData.futures?.code) matchedSection = 'futures';
                    }

                    if (!planData) {
                        for (const key in data) {
                            const p = data[key];
                            if (p.stock?.code === code) { planData = p; matchedSection = 'stock'; break; }
                            if (p.options?.code === code) { planData = p; matchedSection = 'options'; break; }
                            if (p.futures?.code === code) { planData = p; matchedSection = 'futures'; break; }
                        }
                    }

                    if (planData && matchedSection) {
                        const s = planData[matchedSection];
                        document.getElementById('plan-variety').value = s.variety || '';
                        document.getElementById('plan-code').value = s.code || code;
                        document.getElementById('plan-target').value = s.target || '';
                        document.getElementById('plan-d').value = s.d || '';
                        document.getElementById('plan-w').value = s.w || '';
                        document.getElementById('plan-mo').value = s.mo || '';
                        document.getElementById('plan-plan1').value = s.plan1 || '';
                        document.getElementById('plan-plan2').value = s.plan2 || '';
                        document.getElementById('plan-plan3').value = s.plan3 || '';
                        document.getElementById('plan-plan4').value = s.plan4 || '';
                        document.getElementById('plan-conclusion').value = s.conclusion || '';
                        document.getElementById('plan-result').innerHTML = s.result || '';
                        alert(`已加载 Plan: ${code} (${matchedSection})`);
                    } else {
                        alert(`未找到代码/标题为 ${code} 的 Plan 数据`);
                    }
                }).catch(err => alert('查询失败：' + err.message));
            }
        });

        // ==================== Fund 搜索（仅客户号可输入） ====================
        document.getElementById('fund-account').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                let inputVal = e.target.value.trim();
                if (!inputVal) return alert('请输入客户号或关联手机号');

                const fundsRef = ref(db, 'funds');
                get(fundsRef).then(snapshot => {
                    const allFunds = snapshot.val();
                    if (!allFunds) return alert('funds 节点为空');

                    let foundData = null;
                    let matchedType = null;
                    let matchedPhone = null;

                    if (allFunds[inputVal]) {
                        foundData = allFunds[inputVal];
                        matchedPhone = inputVal;
                        if (foundData.stock?.account) matchedType = 'stock';
                        else if (foundData.options?.account) matchedType = 'options';
                        else if (foundData.futures?.account) matchedType = 'futures';
                    }

                    if (!foundData) {
                        for (const phone in allFunds) {
                            const data = allFunds[phone];
                            if (data.stock?.account === inputVal) {
                                foundData = data; matchedType = 'stock'; matchedPhone = phone; break;
                            }
                            if (data.options?.account === inputVal) {
                                foundData = data; matchedType = 'options'; matchedPhone = phone; break;
                            }
                            if (data.futures?.account === inputVal) {
                                foundData = data; matchedType = 'futures'; matchedPhone = phone; break;
                            }
                        }
                    }

                    if (foundData && matchedType) {
                        const section = foundData[matchedType];
                        const prefix = matchedType + '_';
                        document.getElementById('fund-broker').value = section.broker || '';
                        document.getElementById('fund-account').value = section.account || inputVal;
                        document.getElementById('fund-password').value = section.password || '';
                        document.getElementById('fund-equity').textContent = foundData[`${prefix}totalEquity`] || foundData[`${matchedType}_totalEquity`] || '0.00';
                        document.getElementById('fund-cost').textContent = foundData[`${prefix}totalCost`] || foundData[`${matchedType}_totalCost`] || '0.00';
                        document.getElementById('fund-available').value = section.available || '0.00';

                        const container = document.querySelector('#fund-section .holdings-container');
                        container.innerHTML = '';
                        const holdings = foundData[`${matchedType}_holdings`] || [];
                        holdings.forEach(h => addHolding('fund-section', h));
                        updateTotals('fund-section');

                        alert(`已加载 Fund 数据（手机号: ${matchedPhone}，类型: ${matchedType}）`);
                    } else {
                        alert(`未找到客户号/手机号为 ${inputVal} 的 Fund 数据`);
                    }
                }).catch(err => alert('查询失败：' + err.message));
            }
        });
    </script>
</body>
</html>
