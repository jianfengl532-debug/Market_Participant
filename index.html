<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSITION - Plan - Deploy - Fund</title>
    <link rel="stylesheet" href="assetc/css/style.css">
    <style>
        /* Index-specific styles */
        .plan-section, .deploy-section, .fund-section {
            flex: 1;
            min-width: 320px;
            background: #14171c;
            border: 1px solid #222;
            border-radius: 6px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .main-container {
            padding: 24px;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        /* Deploy 专属样式 */
        .deploy-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .deploy-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            text-align: center;
            flex: 1;
        }
        .deploy-buttons-left button,
        .deploy-buttons-right button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-long { background: #8b2b2b; color: white; }
        .btn-long:hover { background: #a13a3a; }
        .btn-short { background: #2b8b4b; color: white; }
        .btn-short:hover { background: #34a35a; }

        .positions-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card-red, .card-green {
            border-radius: 8px;
            overflow: hidden;
            color: white;
        }
        .card-red { background: #8b2b2b; }
        .card-green { background: #2b8b4b; }

        .card-header, .card-content {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
            flex-wrap: wrap;
        }
        .card-header { border-bottom: 1px solid rgba(255,255,255,0.15); }

        .card-label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.75);
            margin-bottom: 4px;
        }

        .card-header input,
        .card-content input {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.95rem;
        }
        .card-header input[readonly],
        .card-content input[readonly] {
            background: rgba(0,0,0,0.4);
            color: #ddd;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-section">
            <img src="assetc/images/AMi-LOGO.jpg" alt="LOGO" class="logo-img">
            <div>
                <div class="main-title">POSITION</div>
                <div class="sub-title">Plan - Deploy - Fund (overview)</div>
            </div>
        </div>
        <div class="nav">
            <span class="active">Home</span>
            <a href="https://jianfengl532-debug.github.io/Market_Participant/plan/plan.html" target="_blank">Plan+</a>
            <a href="https://jianfengl532-debug.github.io/Market_Participant/fund/fund.html" target="_blank">Fund+</a>
        </div>
    </header>

    <div class="main-container">
        <!-- Plan 面板 -->
        <div class="plan-section">
            <h2>Plan</h2>
            <div class="plan-layout">
                <div class="left-area">
                    <div class="row inline-row">
                        <input id="plan-variety" placeholder="品种" readonly>
                        <input id="plan-code" placeholder="代码">
                    </div>
                    <div class="row">
                        <label>目标</label>
                        <input id="plan-target" placeholder="目标" readonly>
                    </div>
                    <div class="row inline-row">
                        <input id="plan-d" placeholder="D" readonly>
                        <input id="plan-w" placeholder="W" readonly>
                        <input id="plan-mo" placeholder="Mo" readonly>
                    </div>
                    <div class="row plan-grid">
                        <textarea id="plan-plan1" placeholder="Plan 1" readonly></textarea>
                        <textarea id="plan-plan2" placeholder="Plan 2" readonly></textarea>
                    </div>
                    <div class="row plan-grid">
                        <textarea id="plan-plan3" placeholder="Plan 3" readonly></textarea>
                        <textarea id="plan-plan4" placeholder="Plan 4" readonly></textarea>
                    </div>
                    <div class="row conclusion">
                        <label>结论</label>
                        <textarea id="plan-conclusion" placeholder="结论" readonly></textarea>
                    </div>
                </div>
                <div class="price-area">
                    <input type="number" id="plan-price1" placeholder="价格1" step="0.01" readonly>
                    <input type="number" id="plan-price2" placeholder="价格2" step="0.01" readonly>
                    <input type="number" id="plan-price3" placeholder="价格3" step="0.01" readonly>
                    <button class="calc-btn">计算</button>
                    <div class="result-list" id="plan-result"></div>
                </div>
            </div>
        </div>

        <!-- Deploy 面板 -->
        <div class="deploy-section">
            <div class="deploy-header">
                <div class="deploy-buttons-left">
                    <button onclick="addLongPosition()" class="btn-long">+ 多单</button>
                </div>
                <h3 class="deploy-title">Deploy</h3>
                <div class="deploy-buttons-right">
                    <button onclick="addShortPosition()" class="btn-short">+ 空单</button>
                </div>
            </div>
            <div class="positions-container" id="positions-container"></div>
        </div>

        <!-- Fund 面板 -->
        <div class="fund-section" id="fund-section">
            <h2>Fund</h2>
            <div class="account-row">
                <input id="fund-broker" placeholder="开户公司" readonly>
                <input id="fund-account" placeholder="请输入客户号并按回车搜索" style="flex: 2;">
                <input id="fund-password" type="password" placeholder="登录密码" readonly>
            </div>
            <div class="value-row">
                <div class="value-card">
                    <div class="value-label">持仓权益</div>
                    <div class="value-number" id="fund-equity">0.00</div>
                </div>
                <div class="value-card">
                    <div class="value-label">持仓成本</div>
                    <div class="value-number" id="fund-cost">0.00</div>
                </div>
                <div class="value-card available-funds">
                    <div class="value-label">可用资金</div>
                    <input type="number" step="0.01" value="0.00" id="fund-available" readonly>
                </div>
            </div>
            <div class="add-btn-container"><button class="add-btn">+</button></div>
            <div class="holdings-container"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
        import { getDatabase, ref, get, set, remove } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ-2yPwU8CJjH_aYOCWcTe4roVoeuBLE0",
            authDomain: "myposition-5ac17.firebaseapp.com",
            databaseURL: "https://myposition-5ac17-default-rtdb.firebaseio.com",
            projectId: "myposition-5ac17",
            storageBucket: "myposition-5ac17.firebasestorage.app",
            messagingSenderId: "73151832359",
            appId: "1:73151832359:web:4727b07af94e2d14220902",
            measurementId: "G-R3F88K50DV"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const deploysRef = ref(db, 'deploys');

        function getCurrentDateTime() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        }

        function calculateProfit(card) {
            const isLong = card.classList.contains('card-red');
            let openPrice = 0, closePrice = 0, startTime = '', endTime = '';

            card.querySelectorAll('input').forEach(input => {
                const label = input.closest('div').querySelector('.card-label')?.textContent.trim();
                const value = input.value.trim();

                if ((label === '买开均价' && isLong) || (label === '卖开均价' && !isLong)) {
                    openPrice = parseFloat(value) || 0;
                }
                if (label === '平仓均价') closePrice = parseFloat(value) || 0;
                if (label === '开始时间') startTime = value;
                if (label === '结束时间') endTime = value;
            });

            let days = 1;
            if (startTime && endTime) {
                const s = new Date(startTime.split(' ')[0]);
                const e = new Date(endTime.split(' ')[0]);
                days = Math.max(1, Math.ceil((e - s) / (86400000)));
            }

            let dailyProfit = 0, profitRate = 0;
            if (isLong) {
                dailyProfit = (closePrice - openPrice) / days;
                profitRate = openPrice ? (closePrice - openPrice) / openPrice * 100 : 0;
            } else {
                dailyProfit = (openPrice - closePrice) / days;
                profitRate = openPrice ? (openPrice - closePrice) / openPrice * 100 : 0;
            }

            card.querySelector('.profit-display').textContent = `¥ ${dailyProfit.toFixed(2)}`;
            card.querySelector('.profit-rate').textContent = `${profitRate.toFixed(2)}%`;
        }

        function createPositionCard(type = 'long', savedData = {}) {
            const isLong = type === 'long';

            // 如果是通过按钮点击创建新仓位（没有savedData或没有code），则创建可编辑的空白卡片
            const isNewPosition = !savedData.code || savedData.code.trim() === '';

            if (isNewPosition) {
                // 创建一个新的可编辑位置卡片，所有字段都可编辑
                const tempId = 'temp_' + Date.now(); // 临时ID
                const html = `
                    <div class="${isLong ? 'card-red' : 'card-green'}" data-id="${tempId}">
                        <div class="card-header">
                            <div><div class="card-label">代码</div><input value="" placeholder="请输入代码"></div>
                            <div><div class="card-label">目标</div><input value="" placeholder="请输入目标"></div>
                            <div><div class="card-label">开始时间</div><input value="${getCurrentDateTime()}" readonly></div>
                            <div><div class="card-label">结束时间</div><input value="" placeholder="请选择结束时间"></div>
                            <div class="ml-auto text-right">
                                <div class="card-label">日效益</div>
                                <div class="profit-display">¥ 0.00</div>
                            </div>
                            <div class="card-actions">
                                <button onclick="editPosition(this)" class="card-btn edit-btn">保存</button>
                                <button onclick="deletePosition(this)" class="card-btn delete-btn">删除</button>
                            </div>
                        </div>
                        <div class="card-content">
                            <div><div class="card-label">品种</div><input value="" placeholder="请输入品种"></div>
                            <div>
                                <div style="display:flex;gap:8px;">
                                    <div><div class="card-label">D趋势</div><input value="" placeholder="D" style="width:72px;text-align:center;"></div>
                                    <div><div class="card-label">W趋势</div><input value="" placeholder="W" style="width:72px;text-align:center;"></div>
                                    <div><div class="card-label">Mo趋势</div><input value="" placeholder="Mo" style="width:72px;text-align:center;"></div>
                                </div>
                            </div>
                            <div><div class="card-label">${isLong ? '买开均价' : '卖开均价'}</div><input value="" placeholder="请输入开仓价格"></div>
                            <div><div class="card-label">平仓均价</div><input value="" placeholder="请输入平仓价格"></div>
                            <div class="ml-auto text-right">
                                <div class="card-label">利润率</div>
                                <div class="profit-rate" style="font-size:1.25rem;font-weight:bold;color:#00cc88;">0.00%</div>
                            </div>
                        </div>
                    </div>
                `;

                const container = document.getElementById('positions-container');
                container.insertAdjacentHTML('beforeend', html);

                const card = container.lastElementChild;
                // 新创建的卡片所有输入框都是可编辑的
                card.querySelectorAll('input').forEach(inp => {
                    inp.readOnly = false;
                    inp.addEventListener('input', () => calculateProfit(card));
                });

                // 自动聚焦到代码输入框
                const codeInput = card.querySelector('.card-label').textContent === '代码' ?
                    card.querySelector('.card-label').nextElementSibling :
                    card.querySelector('input');
                if (codeInput) codeInput.focus();

                return card;
            }

            // 使用代码作为唯一标识
            const id = savedData.code;

            // 字段名映射：将保存时的中文键名映射回程序中使用的英文键名
            const fieldMapping = {
                '目标': '目标',
                '开始时间': '开始时间',
                '结束时间': '结束时间',
                '品种': '品种',
                '买开均价': '买开均价',
                '卖开均价': '卖开均价',
                '平仓均价': '平仓均价',
                'D趋势': 'trend1',
                'W趋势': 'trend2',
                'Mo趋势': 'trend3'
            };

            // 获取保存的数据值
            const getSavedValue = (key) => {
                // 首先尝试直接访问（兼容旧数据）
                if (savedData[key]) return savedData[key];

                // 然后尝试中文键名（新保存的数据格式）
                for (const [chineseKey, englishKey] of Object.entries(fieldMapping)) {
                    if (englishKey === key || chineseKey === key) {
                        const chineseValue = savedData[chineseKey];
                        if (chineseValue) return chineseValue;
                    }
                }

                return savedData[key] || '';
            };

            const html = `
                <div class="${isLong ? 'card-red' : 'card-green'}" data-id="${id}">
                    <div class="card-header">
                        <div><div class="card-label">代码</div><input value="${savedData.code || ''}" readonly></div>
                        <div><div class="card-label">目标</div><input value="${getSavedValue('目标')}" readonly></div>
                        <div><div class="card-label">开始时间</div><input value="${getSavedValue('开始时间') || getCurrentDateTime()}" readonly></div>
                        <div><div class="card-label">结束时间</div><input value="${getSavedValue('结束时间')}" readonly></div>
                        <div class="ml-auto text-right">
                            <div class="card-label">日效益</div>
                            <div class="profit-display">¥ 0.00</div>
                        </div>
                        <div class="card-actions">
                            <button onclick="editPosition(this)" class="card-btn edit-btn">编辑</button>
                            <button onclick="deletePosition(this)" class="card-btn delete-btn">删除</button>
                        </div>
                    </div>
                    <div class="card-content">
                        <div><div class="card-label">品种</div><input value="${getSavedValue('品种')}" readonly></div>
                        <div>
                            <div style="display:flex;gap:8px;">
                                <div><div class="card-label">D趋势</div><input value="${getSavedValue('D趋势') || savedData.trend1 || ''}" style="width:72px;text-align:center;" readonly></div>
                                <div><div class="card-label">W趋势</div><input value="${getSavedValue('W趋势') || savedData.trend2 || ''}" style="width:72px;text-align:center;" readonly></div>
                                <div><div class="card-label">Mo趋势</div><input value="${getSavedValue('Mo趋势') || savedData.trend3 || ''}" style="width:72px;text-align:center;" readonly></div>
                            </div>
                        </div>
                        <div><div class="card-label">${isLong ? '买开均价' : '卖开均价'}</div><input value="${getSavedValue(isLong ? '买开均价' : '卖开均价')}" readonly></div>
                        <div><div class="card-label">平仓均价</div><input value="${getSavedValue('平仓均价')}" readonly></div>
                        <div class="ml-auto text-right">
                            <div class="card-label">利润率</div>
                            <div class="profit-rate" style="font-size:1.25rem;font-weight:bold;color:#00cc88;">0.00%</div>
                        </div>
                    </div>
                </div>
            `;

            const container = document.getElementById('positions-container');
            container.insertAdjacentHTML('beforeend', html);

            const card = container.lastElementChild;
            card.querySelectorAll('input').forEach(inp => {
                inp.addEventListener('input', () => calculateProfit(card));
            });
            calculateProfit(card);
            return card;
        }

        window.addLongPosition = () => createPositionCard('long');
        window.addShortPosition = () => createPositionCard('short');

        window.editPosition = function(btn) {
            const card = btn.closest('.card-red, .card-green');
            const inputs = card.querySelectorAll('input');

            if (btn.textContent === '编辑') {
                // 切换到编辑模式
                inputs.forEach(i => i.readOnly = false);
                btn.textContent = '保存';
            } else {
                // 切换到保存模式
                // 检查代码是否已填写
                let code = '';
                card.querySelectorAll('input').forEach(input => {
                    const label = input.closest('div').querySelector('.card-label')?.textContent.trim();
                    if (label === '代码') {
                        code = input.value.trim();
                    }
                });

                if (!code) {
                    alert('请输入代码后再保存');
                    return;
                }

                // 设置所有输入框为只读
                inputs.forEach(i => i.readOnly = true);
                btn.textContent = '编辑';

                // 保存到数据库
                saveToFirebase(card);
            }
        };

        function saveToFirebase(card) {
            // 获取代码值作为唯一标识
            const codeInput = card.querySelector('.card-label').textContent === '代码' ?
                card.querySelector('.card-label').nextElementSibling :
                card.querySelector('input[value]');

            let code = '';
            card.querySelectorAll('input').forEach(input => {
                const label = input.closest('div').querySelector('.card-label')?.textContent.trim();
                if (label === '代码') {
                    code = input.value.trim();
                }
            });

            // 如果没有代码，则不保存
            if (!code) {
                alert('请输入代码后再保存');
                return;
            }

            const data = {
                code: code,
                type: card.classList.contains('card-red') ? 'long' : 'short'
            };

            card.querySelectorAll('input').forEach(input => {
                const label = input.closest('div').querySelector('.card-label')?.textContent.trim();
                if (label && label !== '代码') {
                    // 特殊处理趋势字段，保存为英文键名
                    let fieldName = label.toLowerCase().replace(/ /g,'');
                    if (label === 'D趋势') fieldName = 'trend1';
                    if (label === 'W趋势') fieldName = 'trend2';
                    if (label === 'Mo趋势') fieldName = 'trend3';
                    data[fieldName] = input.value;
                }
            });

            data.dailyProfit = card.querySelector('.profit-display').textContent;
            data.profitRate = card.querySelector('.profit-rate').textContent;

            // 使用代码作为键名保存到数据库
            set(ref(db, 'deploys/' + code), data)
                .then(() => {
                    console.log('数据保存成功:', code);
                })
                .catch((error) => {
                    console.error('数据保存失败:', error);
                    alert('保存失败，请检查网络连接');
                });
        }

        window.deletePosition = function(btn) {
            if (confirm('确定要删除此仓位吗？')) {
                const card = btn.closest('.card-red, .card-green');

                // 获取代码值
                let code = '';
                card.querySelectorAll('input').forEach(input => {
                    const label = input.closest('div').querySelector('.card-label')?.textContent.trim();
                    if (label === '代码') {
                        code = input.value.trim();
                    }
                });

                // 从数据库删除对应数据
                if (code) {
                    remove(ref(db, 'deploys/' + code))
                        .then(() => {
                            console.log('数据库删除成功:', code);
                        })
                        .catch((error) => {
                            console.error('数据库删除失败:', error);
                        });
                }

                // 删除页面上的卡片
                card.remove();
            }
        };

        // ==================== Plan 搜索（完整字段加载） ====================
        document.getElementById('plan-code').addEventListener('keydown', async (e) => {
            if (e.key !== 'Enter') return;
            const code = e.target.value.trim();
            if (!code) return alert('请输入代码');

            const snapshot = await get(ref(db, 'plans'));
            const allPlans = snapshot.val();
            if (!allPlans) return alert('plans 节点为空');

            let found = null;
            for (let key in allPlans) {
                const item = allPlans[key];
                if (key === code || item.code === code ||
                    (item.stock && item.stock.code === code) ||
                    (item.futures && item.futures.code === code) ||
                    (item.options && item.options.code === code)) {

                    found = item.stock || item.futures || item.options || item;
                    break;
                }
            }

            if (found) {
                // 基础字段
                document.getElementById('plan-variety').value = found.variety || '';
                document.getElementById('plan-code').value = found.code || code;
                document.getElementById('plan-target').value = found.target || '';
                document.getElementById('plan-d').value = found.d || '';
                document.getElementById('plan-w').value = found.w || '';
                document.getElementById('plan-mo').value = found.mo || '';
                document.getElementById('plan-plan1').value = found.plan1 || '';
                document.getElementById('plan-plan2').value = found.plan2 || '';
                document.getElementById('plan-plan3').value = found.plan3 || '';
                document.getElementById('plan-plan4').value = found.plan4 || '';
                document.getElementById('plan-conclusion').value = found.conclusion || '';

                // 新增：价格和计算结果
                document.getElementById('plan-price1').value = found.price1 || found.price_1 || '';
                document.getElementById('plan-price2').value = found.price2 || found.price_2 || '';
                document.getElementById('plan-price3').value = found.price3 || found.price_3 || '';

                const resultDiv = document.getElementById('plan-result');
                resultDiv.innerHTML = found.result ? found.result : '<div style="color:#888;text-align:center;">暂无计算结果</div>';

                alert(`✅ Plan 加载成功: ${code}`);
            } else {
                alert(`❌ 未找到代码: ${code}`);
            }
        });

        // ==================== Fund 搜索 ====================
        document.getElementById('fund-account').addEventListener('keydown', async (e) => {
            if (e.key !== 'Enter') return;
            const val = e.target.value.trim();
            if (!val) return alert('请输入客户号或手机号');

            const snapshot = await get(ref(db, 'funds'));
            const allFunds = snapshot.val();
            if (!allFunds) return alert('funds 节点为空');

            let found = null;
            let foundEntry = null; // 保存完整的entry对象
            let accountType = null; // 记录找到的账户类型

            for (let phone in allFunds) {
                const entry = allFunds[phone];
                if (phone === val || entry.client?.phone === val) {
                    found = entry;
                    foundEntry = entry;
                    accountType = 'main';
                    break;
                }
                if (entry.stock && entry.stock.account === val) {
                    found = entry.stock;
                    foundEntry = entry;
                    accountType = 'stock';
                    break;
                }
                if (entry.futures && entry.futures.account === val) {
                    found = entry.futures;
                    foundEntry = entry;
                    accountType = 'futures';
                    break;
                }
                if (entry.options && entry.options.account === val) {
                    found = entry.options;
                    foundEntry = entry;
                    accountType = 'options';
                    break;
                }
            }

            if (found) {
                console.log('Found fund data:', found); // 调试信息
                console.log('Found entry:', foundEntry); // 调试信息
                console.log('Account type:', accountType); // 调试信息

                // 调试：检查所有可能的available字段
                console.log('=== Available Fields Debug ===');
                console.log('found.available:', found.available);
                console.log('foundEntry.stock_available:', foundEntry?.stock_available);
                console.log('foundEntry.futures_available:', foundEntry?.futures_available);
                console.log('foundEntry.options_available:', foundEntry?.options_available);
                console.log('found.stock_available:', found.stock_available);
                console.log('found.futures_available:', found.futures_available);
                console.log('found.options_available:', found.options_available);

                // 从完整对象或子对象中获取broker信息
                document.getElementById('fund-broker').value = foundEntry.broker || found.broker || '';
                document.getElementById('fund-account').value = found.account || val;
                document.getElementById('fund-password').value = found.password || '';

                // 根据账户类型获取对应的资金数据
                let equityField, costField, availableField;

                if (accountType === 'stock') {
                    // 通过股票账户搜索，found是entry.stock，字段在found对象中
                    equityField = found.totalEquity || foundEntry?.stock_totalEquity || '0.00';
                    costField = found.totalCost || foundEntry?.stock_totalCost || '0.00';
                    availableField = found.available || foundEntry?.stock_available || '0.00';
                } else if (accountType === 'futures') {
                    // 通过期货账户搜索，found是entry.futures，字段在found对象中
                    equityField = found.totalEquity || foundEntry?.futures_totalEquity || '0.00';
                    costField = found.totalCost || foundEntry?.futures_totalCost || '0.00';
                    availableField = found.available || foundEntry?.futures_available || '0.00';
                } else if (accountType === 'options') {
                    // 通过期权账户搜索，found是entry.options，字段在found对象中
                    equityField = found.totalEquity || foundEntry?.options_totalEquity || '0.00';
                    costField = found.totalCost || foundEntry?.options_totalCost || '0.00';
                    availableField = found.available || foundEntry?.options_available || '0.00';
                } else {
                    // 通过手机号搜索，found是完整的entry
                    equityField = found.stock_totalEquity || found.totalEquity || '0.00';
                    costField = found.stock_totalCost || found.totalCost || '0.00';
                    availableField = found.stock_available || found.available || '0.00';
                }

                console.log('Setting equity:', equityField);
                console.log('Setting cost:', costField);
                console.log('Setting available:', availableField);

                document.getElementById('fund-equity').textContent = equityField;
                document.getElementById('fund-cost').textContent = costField;
                document.getElementById('fund-available').value = availableField;

                const container = document.querySelector('#fund-section .holdings-container');
                container.innerHTML = '';
                const holdings = found.stock_holdings || found.holdings || [];
                if (Array.isArray(holdings)) holdings.forEach(h => addHolding('fund-section', h));

                alert('✅ Fund 加载成功');
                // 保存账户信息供下次使用
                localStorage.setItem('lastFundAccount', val);
            } else {
                alert(`❌ 未找到: ${val}`);
            }
        });

        // Fund 持仓函数
        function addHolding(sectionId, initial = {}) {
            const section = document.getElementById(sectionId);
            const container = section.querySelector('.holdings-container');
            const item = document.createElement('div');
            item.className = 'holding-item';
            item.innerHTML = `
                <div><label>代码</label><input type="text" class="code" value="${initial.code || ''}" readonly></div>
                <div><label>成本价</label><input type="number" class="cost" value="${initial.cost || '0.00'}" readonly></div>
                <div><label>数量</label><input type="number" class="quantity" value="${initial.quantity || '0'}" readonly></div>
                <div><label>结算价</label><input type="number" class="settle" value="${initial.settle || '0.00'}" readonly></div>
                <div class="holding-actions">
                    <button class="calc-btn">计算</button>
                    <button class="delete-btn">删除</button>
                </div>
            `;
            container.appendChild(item);
            item.querySelector('.calc-btn').addEventListener('click', () => updateTotals(sectionId));
            item.querySelector('.delete-btn').addEventListener('click', () => { item.remove(); updateTotals(sectionId); });
        }

        function updateTotals(sectionId) {
            const section = document.getElementById(sectionId);
            let equity = 0, cost = 0;
            section.querySelectorAll('.holding-item').forEach(row => {
                const qty = parseFloat(row.querySelector('.quantity').value) || 0;
                const c = parseFloat(row.querySelector('.cost').value) || 0;
                const s = parseFloat(row.querySelector('.settle').value) || 0;
                equity += s * qty;
                cost += c * qty;
            });
            document.getElementById('fund-equity').textContent = equity.toFixed(2);
            document.getElementById('fund-cost').textContent = cost.toFixed(2);
        }

        document.querySelector('.add-btn').addEventListener('click', () => addHolding('fund-section'));

        // 加载已有数据
        async function loadDeploys() {
            try {
                console.log('开始加载仓位数据...');

                const snapshot = await get(deploysRef);
                const data = snapshot.val();

                if (!data) {
                    console.log('数据库中没有仓位数据');
                    return;
                }

                console.log('从数据库获取到原始数据:', data);

                // 清空现有卡片
                const container = document.getElementById('positions-container');
                container.innerHTML = '';

                // 按代码排序后加载数据
                const sortedEntries = Object.entries(data).sort(([a], [b]) => a.localeCompare(b));

                let loadedCount = 0;
                let errorCount = 0;

                for (const [code, item] of sortedEntries) {
                    try {
                        console.log(`加载仓位 ${code}:`, item);

                        // 验证数据完整性
                        if (!item.code) {
                            console.warn(`仓位数据缺少代码字段，跳过: ${code}`);
                            errorCount++;
                            continue;
                        }

                        createPositionCard(item.type || 'long', item);
                        loadedCount++;
                    } catch (itemError) {
                        console.error(`加载仓位 ${code} 时出错:`, itemError);
                        errorCount++;
                    }
                }

                console.log(`数据加载完成，成功加载 ${loadedCount} 条记录，${errorCount} 条记录加载失败`);

                if (errorCount > 0) {
                    alert(`数据加载完成，但有 ${errorCount} 条记录加载失败，请检查数据完整性`);
                }
            } catch (error) {
                console.error('数据加载失败:', error);
                alert('数据加载失败，请检查网络连接');
            }
        }

        // 页面加载时自动加载数据
        window.addEventListener('load', function() {
            loadDeploys();
            // 尝试加载上次使用的账户信息
            const lastAccount = localStorage.getItem('lastFundAccount');
            if (lastAccount) {
                document.getElementById('fund-account').value = lastAccount;
                // 自动触发搜索
                const event = new KeyboardEvent('keydown', {
                    key: 'Enter',
                    code: 'Enter',
                    keyCode: 13,
                    which: 13,
                    bubbles: true
                });
                document.getElementById('fund-account').dispatchEvent(event);
            }
        });
    </script>
</body>
