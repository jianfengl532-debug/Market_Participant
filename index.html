<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSITION - Plan - Deploy - Fund</title>
    <link rel="stylesheet" href="assetc/css/style.css">
    <style>
        /* Index-specific styles */
        .plan-section, .deploy-section, .fund-section {
            flex: 1;
            min-width: 320px;
            background: #14171c;
            border: 1px solid #222;
            border-radius: 6px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .main-container {
            padding: 24px;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        /* Deploy 专属样式 */
        .deploy-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .deploy-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            text-align: center;
            flex: 1;
        }
        .deploy-buttons-left button,
        .deploy-buttons-right button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-long { background: #8b2b2b; color: white; }
        .btn-long:hover { background: #a13a3a; }
        .btn-short { background: #2b8b4b; color: white; }
        .btn-short:hover { background: #34a35a; }

        .positions-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card-red, .card-green {
            border-radius: 8px;
            overflow: hidden;
            color: white;
        }
        .card-red { background: #8b2b2b; }
        .card-green { background: #2b8b4b; }

        .card-header, .card-content {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
            flex-wrap: wrap;
        }
        .card-header { border-bottom: 1px solid rgba(255,255,255,0.15); }

        .card-label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.75);
            margin-bottom: 4px;
        }

        .card-header input,
        .card-content input {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.95rem;
        }
        .card-header input[readonly],
        .card-content input[readonly] {
            background: rgba(0,0,0,0.4);
            color: #ddd;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-section">
            <img src="assetc/images/AMi-LOGO.jpg" alt="LOGO" class="logo-img">
            <div>
                <div class="main-title">POSITION</div>
                <div class="sub-title">Plan - Deploy - Fund (overview)</div>
            </div>
        </div>
        <div class="nav">
            <span class="active">Home</span>
            <a href="https://jianfengl532-debug.github.io/Market_Participant/plan/plan.html" target="_blank">Plan+</a>
            <a href="https://jianfengl532-debug.github.io/Market_Participant/fund/fund.html" target="_blank">Fund+</a>
        </div>
    </header>

    <div class="main-container">
        <!-- Plan 面板 -->
        <div class="plan-section">
            <h2>Plan</h2>
            <div class="plan-layout">
                <div class="left-area">
                    <div class="row inline-row">
                        <input id="plan-variety" placeholder="品种" readonly>
                        <input id="plan-code" placeholder="代码">
                    </div>
                    <div class="row">
                        <label>目标</label>
                        <input id="plan-target" placeholder="目标" readonly>
                    </div>
                    <div class="row inline-row">
                        <input id="plan-d" placeholder="D" readonly>
                        <input id="plan-w" placeholder="W" readonly>
                        <input id="plan-mo" placeholder="Mo" readonly>
                    </div>
                    <div class="row plan-grid">
                        <textarea id="plan-plan1" placeholder="Plan 1" readonly></textarea>
                        <textarea id="plan-plan2" placeholder="Plan 2" readonly></textarea>
                    </div>
                    <div class="row plan-grid">
                        <textarea id="plan-plan3" placeholder="Plan 3" readonly></textarea>
                        <textarea id="plan-plan4" placeholder="Plan 4" readonly></textarea>
                    </div>
                    <div class="row conclusion">
                        <label>结论</label>
                        <textarea id="plan-conclusion" placeholder="结论" readonly></textarea>
                    </div>
                </div>
                <div class="price-area">
                    <input type="number" id="plan-price1" placeholder="价格1" step="0.01" readonly>
                    <input type="number" id="plan-price2" placeholder="价格2" step="0.01" readonly>
                    <input type="number" id="plan-price3" placeholder="价格3" step="0.01" readonly>
                    <button class="calc-btn">计算</button>
                    <div class="result-list" id="plan-result"></div>
                </div>
            </div>
        </div>

        <!-- Deploy 面板 -->
        <div class="deploy-section">
            <div class="deploy-header">
                <div class="deploy-buttons-left">
                    <button onclick="addLongPosition()" class="btn-long">+ 多单</button>
                </div>
                <h3 class="deploy-title">Deploy</h3>
                <div class="deploy-buttons-right">
                    <button onclick="addShortPosition()" class="btn-short">+ 空单</button>
                </div>
            </div>
            <div class="positions-container" id="positions-container"></div>
        </div>

        <!-- Fund 面板 -->
        <div class="fund-section" id="fund-section">
            <h2>Fund</h2>
            <div class="account-row">
                <input id="fund-broker" placeholder="开户公司" readonly>
                <input id="fund-account" placeholder="客户号">
                <input id="fund-password" type="password" placeholder="登录密码" readonly>
            </div>
            <div class="value-row">
                <div class="value-card">
                    <div class="value-label">持仓权益</div>
                    <div class="value-number" id="fund-equity">0.00</div>
                </div>
                <div class="value-card">
                    <div class="value-label">持仓成本</div>
                    <div class="value-number" id="fund-cost">0.00</div>
                </div>
                <div class="value-card available-funds">
                    <div class="value-label">可用资金</div>
                    <input type="number" step="0.01" value="0.00" id="fund-available" readonly>
                </div>
            </div>
            <div class="add-btn-container"><button class="add-btn">+</button></div>
            <div class="holdings-container"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
        import { getDatabase, ref, get, set, remove } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ-2yPwU8CJjH_aYOCWcTe4roVoeuBLE0",
            authDomain: "myposition-5ac17.firebaseapp.com",
            databaseURL: "https://myposition-5ac17-default-rtdb.firebaseio.com",
            projectId: "myposition-5ac17",
            storageBucket: "myposition-5ac17.firebasestorage.app",
            messagingSenderId: "73151832359",
            appId: "1:73151832359:web:4727b07af94e2d14220902",
            measurementId: "G-R3F88K50DV"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const deploysRef = ref(db, 'deploys');

        function getCurrentDateTime() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        }

        function calculateProfit(card) {
            const isLong = card.classList.contains('card-red');
            let openPrice = 0, closePrice = 0, startTime = '', endTime = '';

            card.querySelectorAll('input').forEach(input => {
                const label = input.closest('div').querySelector('.card-label')?.textContent.trim();
                if (label === '买开均价' || label === '卖开均价') openPrice = parseFloat(input.value) || 0;
                if (label === '平仓均价') closePrice = parseFloat(input.value) || 0;
                if (label === '开始时间') startTime = input.value;
                if (label === '结束时间') endTime = input.value;
            });

            let days = 1;
            if (startTime && endTime) {
                const s = new Date(startTime.split(' ')[0]);
                const e = new Date(endTime.split(' ')[0]);
                days = Math.max(1, Math.ceil((e - s) / (86400000)));
            }

            let dailyProfit = 0, profitRate = 0;
            if (isLong) {
                dailyProfit = (closePrice - openPrice) / days;
                profitRate = openPrice ? (closePrice - openPrice) / openPrice * 100 : 0;
            } else {
                dailyProfit = (openPrice - closePrice) / days;
                profitRate = openPrice ? (openPrice - closePrice) / openPrice * 100 : 0;
            }

            card.querySelector('.profit-display').textContent = `¥ ${dailyProfit.toFixed(2)}`;
            card.querySelector('.profit-rate').textContent = `${profitRate.toFixed(2)}%`;
        }

        function createPositionCard(type = 'long', savedData = {}) {
            const id = savedData.id || 'd_' + Date.now();
            const isLong = type === 'long';

            const html = `
                <div class="${isLong ? 'card-red' : 'card-green'}" data-id="${id}">
                    <div class="card-header">
                        <div><div class="card-label">代码</div><input value="${savedData.code || ''}" readonly></div>
                        <div><div class="card-label">目标</div><input value="${savedData.target || ''}" readonly></div>
                        <div><div class="card-label">开始时间</div><input value="${savedData.startTime || getCurrentDateTime()}" readonly></div>
                        <div><div class="card-label">结束时间</div><input value="${savedData.endTime || ''}" readonly></div>
                        <div class="ml-auto text-right">
                            <div class="card-label">日效益</div>
                            <div class="profit-display">¥ 0.00</div>
                        </div>
                        <div class="card-actions">
                            <button onclick="editPosition(this)" class="card-btn edit-btn">编辑</button>
                            <button onclick="deletePosition(this)" class="card-btn delete-btn">删除</button>
                        </div>
                    </div>
                    <div class="card-content">
                        <div><div class="card-label">品种</div><input value="${savedData.variety || ''}" readonly></div>
                        <div>
                            <div class="card-label">趋势</div>
                            <div style="display:flex;gap:8px;">
                                <input value="${savedData.trend1 || ''}" style="width:72px;text-align:center;" readonly>
                                <input value="${savedData.trend2 || ''}" style="width:72px;text-align:center;" readonly>
                                <input value="${savedData.trend3 || ''}" style="width:72px;text-align:center;" readonly>
                            </div>
                        </div>
                        <div><div class="card-label">${isLong ? '买开均价' : '卖开均价'}</div><input value="${savedData.openPrice || ''}" readonly></div>
                        <div><div class="card-label">平仓均价</div><input value="${savedData.closePrice || ''}" readonly></div>
                        <div class="ml-auto text-right">
                            <div class="card-label">利润率</div>
                            <div class="profit-rate" style="font-size:1.25rem;font-weight:bold;color:#00cc88;">0.00%</div>
                        </div>
                    </div>
                </div>
            `;

            const container = document.getElementById('positions-container');
            container.insertAdjacentHTML('beforeend', html);

            const card = container.lastElementChild;
            card.querySelectorAll('input').forEach(inp => {
                inp.addEventListener('input', () => calculateProfit(card));
            });
            calculateProfit(card);
            return card;
        }

        window.addLongPosition = () => createPositionCard('long');
        window.addShortPosition = () => createPositionCard('short');

        window.editPosition = function(btn) {
            const card = btn.closest('.card-red, .card-green');
            const inputs = card.querySelectorAll('input');
            if (btn.textContent === '编辑') {
                inputs.forEach(i => i.readOnly = false);
                btn.textContent = '保存';
            } else {
                inputs.forEach(i => i.readOnly = true);
                btn.textContent = '编辑';
                saveToFirebase(card);
            }
        };

        function saveToFirebase(card) {
            const id = card.dataset.id;
            const data = { id, type: card.classList.contains('card-red') ? 'long' : 'short' };

            card.querySelectorAll('input').forEach(input => {
                const label = input.closest('div').querySelector('.card-label')?.textContent.trim();
                if (label) data[label.toLowerCase().replace(/ /g,'')] = input.value;
            });

            data.dailyProfit = card.querySelector('.profit-display').textContent;
            data.profitRate = card.querySelector('.profit-rate').textContent;

            set(ref(db, 'deploys/' + id), data);
        }

        window.deletePosition = function(btn) {
            if (confirm('确定要删除此仓位吗？')) {
                const card = btn.closest('.card-red, .card-green');
                remove(ref(db, 'deploys/' + card.dataset.id));
                card.remove();
            }
        };

        // 加载已有数据
        async function loadDeploys() {
            const snapshot = await get(deploysRef);
            const data = snapshot.val();
            if (!data) return;
            document.getElementById('positions-container').innerHTML = '';
            Object.values(data).forEach(item => {
                createPositionCard(item.type || 'long', item);
            });
        }

        window.addEventListener('load', loadDeploys);
    </script>
</body>
</html>
