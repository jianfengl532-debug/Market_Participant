<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>POSITION - Overview</title>
  <link rel="stylesheet" href="assetc/css/style.css">
  <style>
    /* index 頁面專用樣式 - 針對 index3.jpg 優化 */
    .plan-modules-container {
      max-width: 1100px;
      margin: 0 auto 60px;
    }

    .plan-module {
      background: #14171c;
      border: 1px solid #222;
      border-radius: 6px;
      overflow: hidden;
      margin: 32px 0;
    }

    .module-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1a1d21;
      padding: 12px 16px;
      gap: 16px;
    }

    .module-header input:first-child {
      flex: 1;
      background: #222;
      border: none;
      padding: 10px 14px;
      border-radius: 4px;
      color: #fff;
      font-size: 1rem;
    }

    .module-header input:last-child {
      width: 220px;
      background: #222;
      border: none;
      padding: 10px 14px;
      border-radius: 4px;
      color: #fff;
    }

    .plan-table {
      width: 100%;
      border-collapse: collapse;
    }

    .plan-table th {
      background: #1a1d21;
      padding: 12px;
      text-align: center;
      font-weight: normal;
      color: #aaa;
      border-bottom: 1px solid #222;
    }

    .plan-table td {
      padding: 10px 12px;
      border-bottom: 1px solid #222;
      vertical-align: top;
    }

    .plan-table .label {
      font-weight: bold;
      color: #ccc;
      width: 80px;
      padding-right: 12px;
      display: inline-block;
    }

    .plan-table input,
    .plan-table textarea {
      width: calc(100% - 90px);
      background: transparent;
      border: none;
      color: #e0e0e0;
      padding: 6px 0;
      font-family: inherit;
      font-size: inherit;
    }

    .plan-table textarea {
      min-height: 80px;
      max-height: 300px;
      resize: vertical;
      overflow-y: auto;
      line-height: 1.5;
      background: #1a1d21;
      border-radius: 4px;
      padding: 8px 12px;
      margin-left: 8px;
    }

    .plan-table textarea:focus {
      outline: none;
      background: #222;
    }

    .actions-cell {
      width: 120px;
      text-align: center;
      vertical-align: middle;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .add-plan-module {
      text-align: center;
      margin: 60px 0;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-section">
    <img src="assetc/images/AMi-LOGO.jpg" alt="LOGO" class="logo-img">
    <div>
      <div class="main-title">POSITION</div>
      <div class="sub-title">Plan - Fund (overview)</div>
    </div>
  </div>

  <div style="display:flex; gap:16px; align-items:center; flex-wrap:wrap;">
    <button>Home</button>
    <button>Plan +</button>
    <button>Fund+</button>
    <input type="password" placeholder="請輸入管理員密碼" style="width:180px;">
    <button>Login</button>
  </div>
</header>

<div class="section">
  <h1 style="text-align:center; margin:40px 0 20px;">Fund</h1>

  <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(320px, 1fr)); gap:20px; max-width:1200px; margin:0 auto 80px;">
    <div class="card" style="text-align:center; padding:40px 20px;">
      <div style="font-size:2.4rem; color:#0f8; font-weight:bold;">0000000.00</div>
      <div style="margin:12px 0; color:#0f8; font-size:1.2rem;">/ Stock</div>
      <div style="color:#aaa; margin-top:16px;">持仓成本：¥ 000000.00</div>
    </div>

    <div class="card" style="text-align:center; padding:40px 20px;">
      <div style="font-size:2.4rem; color:#0f8; font-weight:bold;">0000000.00</div>
      <div style="margin:12px 0; color:#0f8; font-size:1.2rem;">/ Options</div>
      <div style="color:#aaa; margin-top:16px;">持仓成本：¥ 000000.00</div>
    </div>

    <div class="card" style="text-align:center; padding:40px 20px;">
      <div style="font-size:2.4rem; color:#0f8; font-weight:bold;">0000000.00</div>
      <div style="margin:12px 0; color:#0f8; font-size:1.2rem;">/ Futures</div>
      <div style="color:#aaa; margin-top:16px;">持仓成本：¥ 000000.00</div>
    </div>
  </div>

  <h1 style="text-align:center; margin:60px 0 20px;">Plan</h1>

  <!-- 動態新增的 Plan 模組容器 -->
  <div id="plan-modules-container" class="plan-modules-container"></div>

  <!-- 新增模組按鈕 -->
  <div class="add-plan-module">
    <button class="add-btn" id="add-plan-btn">+</button>
  </div>
</div>

<script>
  // 點擊 + 按鈕，新增一個 Plan 模組
  document.getElementById('add-plan-btn').addEventListener('click', () => {
    const container = document.getElementById('plan-modules-container');

    const module = document.createElement('div');
    module.className = 'plan-module';

    module.innerHTML = `
      <div class="module-header">
        <input type="text" placeholder="Heading">
        <input type="text" placeholder="Expiry Time">
      </div>

      <table class="plan-table">
        <thead>
          <tr>
            <th>Stock</th>
            <th>Options</th>
            <th>Futures</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><span class="label">品种</span><input placeholder="品种"></td>
            <td><span class="label">品种</span><input placeholder="品种"></td>
            <td><span class="label">品种</span><input placeholder="品种"></td>
            <td class="actions-cell" rowspan="5">
              <div class="actions">
                <button class="edit-btn">编辑</button>
                <button class="delete-btn">删除</button>
              </div>
            </td>
          </tr>
          <tr>
            <td><span class="label">代码</span><input placeholder="代码"></td>
            <td><span class="label">代码</span><input placeholder="代码"></td>
            <td><span class="label">代码</span><input placeholder="代码"></td>
          </tr>
          <tr>
            <td><span class="label">目标</span><input placeholder="目标"></td>
            <td><span class="label">目标</span><input placeholder="目标"></td>
            <td><span class="label">目标</span><input placeholder="目标"></td>
          </tr>
          <tr>
            <td colspan="3">
              <span class="label">结论</span>
              <textarea placeholder="结论" rows="4"></textarea>
            </td>
          </tr>
        </tbody>
      </table>
    `;

    container.appendChild(module);

    // 為新加入的 textarea 綁定自動高度調整
    const textarea = module.querySelector('textarea');
    if (textarea) {
      textarea.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
      });
      // 初次觸發一次，確保初始內容也適配
      textarea.dispatchEvent(new Event('input'));
    }
  });
</script>

</body>
</html>
